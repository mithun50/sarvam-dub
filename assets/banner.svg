<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06060b"/>
      <stop offset="50%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#06060b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c6aef"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="40%">
      <stop offset="0%" stop-color="#7c6aef" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7c6aef" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="60%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <!-- Ambient glows -->
  <rect width="1280" height="640" fill="url(#glow1)"/>
  <rect width="1280" height="640" fill="url(#glow2)"/>
  <!-- Grid pattern -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>
  <!-- Logo icon -->
  <g transform="translate(540, 160)">
    <rect width="200" height="200" rx="44" fill="url(#accent)" opacity="0.9"/>
    <circle cx="100" cy="100" r="38" fill="none" stroke="white" stroke-width="6"/>
    <ellipse cx="100" cy="100" rx="17" ry="38" fill="none" stroke="white" stroke-width="4" opacity="0.7"/>
    <line x1="62" y1="100" x2="138" y2="100" stroke="white" stroke-width="3" opacity="0.5"/>
    <!-- Waves left -->
    <path d="M42 78 Q42 100 42 122" stroke="white" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.35"/>
    <!-- Waves right -->
    <path d="M158 78 Q158 100 158 122" stroke="white" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.35"/>
    <!-- Arrow -->
    <path d="M145 92 L160 100 L145 108" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.7"/>
  </g>
  <!-- Title -->
  <text x="640" y="430" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="white" letter-spacing="-2">Sarvam Dub</text>
  <!-- Subtitle -->
  <text x="640" y="480" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="rgba(255,255,255,0.45)">AI-Powered Video Dubbing for 12 Indian Languages</text>
  <!-- Tags -->
  <g transform="translate(640, 530)" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="rgba(255,255,255,0.3)">
    <rect x="-280" y="-18" width="100" height="28" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="-230" y="4">Voice Cloning</text>
    <rect x="-160" y="-18" width="90" height="28" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="-115" y="4">No API Key</text>
    <rect x="-50" y="-18" width="100" height="28" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="0" y="4">Open Source</text>
    <rect x="70" y="-18" width="60" height="28" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="100" y="4">Free</text>
    <rect x="150" y="-18" width="120" height="28" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="210" y="4">Python &amp; Node.js</text>
  </g>
</svg>
