<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c6aef"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.9)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.6)"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Sound waves left -->
  <path d="M140 200 Q140 256 140 312" stroke="white" stroke-width="20" stroke-linecap="round" fill="none" opacity="0.4"/>
  <path d="M108 168 Q108 256 108 344" stroke="white" stroke-width="18" stroke-linecap="round" fill="none" opacity="0.25"/>
  <!-- Globe/circle center -->
  <circle cx="256" cy="256" r="90" fill="none" stroke="white" stroke-width="14"/>
  <ellipse cx="256" cy="256" rx="42" ry="90" fill="none" stroke="white" stroke-width="10" opacity="0.7"/>
  <line x1="166" y1="256" x2="346" y2="256" stroke="white" stroke-width="8" opacity="0.5"/>
  <line x1="188" y1="210" x2="324" y2="210" stroke="white" stroke-width="6" opacity="0.35"/>
  <line x1="188" y1="302" x2="324" y2="302" stroke="white" stroke-width="6" opacity="0.35"/>
  <!-- Arrow right (translation direction) -->
  <path d="M360 240 L400 256 L360 272" stroke="white" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.8"/>
  <!-- Sound waves right -->
  <path d="M372 200 Q372 256 372 312" stroke="white" stroke-width="20" stroke-linecap="round" fill="none" opacity="0.4"/>
  <path d="M404 168 Q404 256 404 344" stroke="white" stroke-width="18" stroke-linecap="round" fill="none" opacity="0.25"/>
</svg>
