<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08081a"/>
      <stop offset="100%" stop-color="#0a0a1e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c6aef"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="40%">
      <stop offset="0%" stop-color="#7c6aef" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#glow1)"/>

  <!-- Center content -->
  <!-- Logo -->
  <g transform="translate(540, 100)">
    <rect width="120" height="120" rx="28" fill="url(#accent)" opacity="0.9"/>
    <circle cx="60" cy="60" r="24" fill="none" stroke="white" stroke-width="3.5"/>
    <ellipse cx="60" cy="60" rx="10" ry="24" fill="none" stroke="white" stroke-width="2.5" opacity="0.6"/>
    <line x1="36" y1="60" x2="84" y2="60" stroke="white" stroke-width="2" opacity="0.4"/>
    <!-- Waves -->
    <path d="M26 44 Q26 60 26 76" stroke="white" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.3"/>
    <path d="M94 44 Q94 60 94 76" stroke="white" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.3"/>
    <!-- Arrow -->
    <path d="M86 54 L96 60 L86 66" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6"/>
  </g>

  <!-- Title -->
  <text x="600" y="290" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="white" letter-spacing="-2">Sarvam Dub</text>

  <!-- Subtitle -->
  <text x="600" y="340" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="rgba(255,255,255,0.45)">AI Video Dubbing for 12 Indian Languages</text>

  <!-- Feature pills -->
  <g transform="translate(600, 400)" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16">
    <rect x="-310" y="-18" width="130" height="38" rx="19" fill="rgba(124,106,239,0.1)" stroke="rgba(124,106,239,0.25)" stroke-width="1"/>
    <text x="-245" y="6" fill="rgba(167,139,250,0.8)">Voice Cloning</text>

    <rect x="-160" y="-18" width="100" height="38" rx="19" fill="rgba(34,201,122,0.08)" stroke="rgba(34,201,122,0.2)" stroke-width="1"/>
    <text x="-110" y="6" fill="rgba(34,201,122,0.7)">Free</text>

    <rect x="-40" y="-18" width="140" height="38" rx="19" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="30" y="6" fill="rgba(255,255,255,0.4)">Open Source</text>

    <rect x="120" y="-18" width="120" height="38" rx="19" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="180" y="6" fill="rgba(255,255,255,0.4)">No API Key</text>
  </g>

  <!-- Language flow visualization -->
  <g transform="translate(600, 500)" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">
    <!-- Source -->
    <rect x="-260" y="-20" width="100" height="40" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="-210" y="6" font-size="15" fill="rgba(255,255,255,0.5)">English</text>

    <!-- Arrow -->
    <text x="-140" y="8" font-size="24" fill="rgba(124,106,239,0.5)">&#x2192;</text>

    <!-- Targets -->
    <rect x="-115" y="-20" width="70" height="40" rx="8" fill="rgba(124,106,239,0.1)" stroke="rgba(124,106,239,0.2)" stroke-width="1"/>
    <text x="-80" y="6" font-size="14" fill="rgba(167,139,250,0.7)">Hindi</text>

    <rect x="-35" y="-20" width="72" height="40" rx="8" fill="rgba(124,106,239,0.1)" stroke="rgba(124,106,239,0.2)" stroke-width="1"/>
    <text x="1" y="6" font-size="14" fill="rgba(167,139,250,0.7)">Tamil</text>

    <rect x="47" y="-20" width="80" height="40" rx="8" fill="rgba(124,106,239,0.1)" stroke="rgba(124,106,239,0.2)" stroke-width="1"/>
    <text x="87" y="6" font-size="14" fill="rgba(167,139,250,0.7)">Bengali</text>

    <rect x="137" y="-20" width="76" height="40" rx="8" fill="rgba(124,106,239,0.1)" stroke="rgba(124,106,239,0.2)" stroke-width="1"/>
    <text x="175" y="6" font-size="14" fill="rgba(167,139,250,0.7)">Telugu</text>

    <text x="240" y="6" font-size="14" fill="rgba(255,255,255,0.2)">+8</text>
  </g>

  <!-- Bottom -->
  <text x="600" y="610" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="rgba(255,255,255,0.2)">github.com/mithun50/sarvam-dub</text>
</svg>
