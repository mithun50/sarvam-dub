<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08081a"/>
      <stop offset="100%" stop-color="#0a0a1e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c6aef"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="20%">
      <stop offset="0%" stop-color="#7c6aef" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="80%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="url(#glow1)"/>
  <rect width="1080" height="1080" fill="url(#glow2)"/>

  <!-- Logo -->
  <g transform="translate(430, 120)">
    <rect width="220" height="220" rx="50" fill="url(#accent)" opacity="0.9"/>
    <circle cx="110" cy="110" r="44" fill="none" stroke="white" stroke-width="6"/>
    <ellipse cx="110" cy="110" rx="20" ry="44" fill="none" stroke="white" stroke-width="4" opacity="0.6"/>
    <line x1="66" y1="110" x2="154" y2="110" stroke="white" stroke-width="3" opacity="0.4"/>
    <path d="M50 82 Q50 110 50 138" stroke="white" stroke-width="7" stroke-linecap="round" fill="none" opacity="0.3"/>
    <path d="M170 82 Q170 110 170 138" stroke="white" stroke-width="7" stroke-linecap="round" fill="none" opacity="0.3"/>
    <path d="M160 100 L176 110 L160 120" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6"/>
  </g>

  <!-- Title -->
  <text x="540" y="430" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="white" letter-spacing="-2">Sarvam Dub</text>

  <!-- Subtitle -->
  <text x="540" y="490" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="rgba(255,255,255,0.45)">AI Video Dubbing</text>

  <!-- Divider -->
  <line x1="440" y1="530" x2="640" y2="530" stroke="rgba(124,106,239,0.2)" stroke-width="2"/>

  <!-- Features -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="rgba(255,255,255,0.6)">
    <circle cx="310" cy="590" r="6" fill="#22c97a"/>
    <text x="328" y="598">12 Indian Languages</text>

    <circle cx="310" cy="640" r="6" fill="#22c97a"/>
    <text x="328" y="648">AI Voice Cloning</text>

    <circle cx="310" cy="690" r="6" fill="#22c97a"/>
    <text x="328" y="698">Free &amp; Open Source</text>

    <circle cx="310" cy="740" r="6" fill="#22c97a"/>
    <text x="328" y="748">No API Key Needed</text>

    <circle cx="310" cy="790" r="6" fill="#22c97a"/>
    <text x="328" y="798">Python &amp; Node.js SDK</text>
  </g>

  <!-- Language flow -->
  <g transform="translate(540, 890)" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">
    <rect x="-340" y="-22" width="680" height="50" rx="25" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

    <text x="-240" y="6" font-size="16" fill="rgba(255,255,255,0.4)">Hindi</text>
    <text x="-160" y="6" font-size="14" fill="rgba(255,255,255,0.15)">|</text>
    <text x="-100" y="6" font-size="16" fill="rgba(255,255,255,0.4)">Tamil</text>
    <text x="-30" y="6" font-size="14" fill="rgba(255,255,255,0.15)">|</text>
    <text x="40" y="6" font-size="16" fill="rgba(255,255,255,0.4)">Bengali</text>
    <text x="120" y="6" font-size="14" fill="rgba(255,255,255,0.15)">|</text>
    <text x="190" y="6" font-size="16" fill="rgba(255,255,255,0.4)">Telugu</text>
    <text x="270" y="6" font-size="14" fill="rgba(255,255,255,0.15)">|</text>
    <text x="310" y="6" font-size="16" fill="rgba(255,255,255,0.25)">+8</text>
  </g>

  <!-- Bottom URL -->
  <text x="540" y="1010" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="rgba(255,255,255,0.2)">github.com/mithun50/sarvam-dub</text>

  <!-- Author -->
  <text x="540" y="1045" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="rgba(255,255,255,0.12)">by Mithun Gowda B</text>
</svg>
